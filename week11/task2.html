<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <title>Palindrome Number</title>
  </head>
  <body>
    <div class="container-sm bg-warning mt-5 pt-5">
      <div
        class="d-flex flex-column justify-content-center align-items-center pb-5"
      >
        <h2 class="text-center mb-5">Palindrome Number Checker</h2>

        <input
          class="form-control w-50"
          type="text"
          id="number"
          placeholder="Enter number"
        />
        <button class="btn btn-primary m-3" onclick="checkPalindrome()">
          Check
        </button>

        <h3 id="result"></h3>
      </div>
    </div>

    <script>
      function checkPalindrome() {
        let number = document.getElementById("number").value.trim();

        // Reverse the number string
        let reverse = number.split("").reverse().join("");

        // Compare and display result
        if (number === reverse) {
          document.getElementById("result").innerHTML =
            `${number} is a palindrome number.`;
        } else {
          document.getElementById("result").innerHTML =
            `${number} is not a palindrome number.`;
        }
      }
    </script>
  </body>
</html>
