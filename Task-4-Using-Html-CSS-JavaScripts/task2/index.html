<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Grade Checker</title>
    <link rel="stylesheet" href="../styles.css" />
  </head>
  <body>
    <main class="card">
      <h1>Grade Checker</h1>
      <form id="gradeForm" class="controls">
        <input
          id="score"
          type="number"
          min="0"
          max="100"
          placeholder="Score (0–100)"
          required
        />
        <button type="submit">Check</button>
      </form>
      <p id="gradeResult" class="result" aria-live="polite"></p>
    </main>
    <script src="script.js"></script>
  </body>
</html>
